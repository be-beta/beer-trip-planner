<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CervaScore</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍺</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Spicy+Rice&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        };
    </script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 antialiased font-sans transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // CONFIGURAÇÃO - PREENCHA AQUI
        const CONFIG = {
            apiKey: 'AIzaSyC8MEPV3y1vKuCqUsaq_QsnE48cz6olUn4',
            spreadsheetId: '1Si2vj7KgRgLKOGSyVy7tWAAm6QFRrb_7pI4NsHo5jH4',
            appsScriptUrl: 'https://script.google.com/macros/s/AKfycbwyE2GBwG5C3KyKdDjynmXiTlLPLy68kFNCWx7ZB3dQdcmDYJHhreGX751IEEHJORMUlw/exec',  // URL completa terminando com /exec
            beersRange: 'Cervejas!A:L',
            groupsRange: 'Grupos!A:C'
        };

        function BeerCalculator() {
            const [beers, setBeers] = useState([]);
            const [loading, setLoading] = useState(false);
            const [userName, setUserName] = useState(localStorage.getItem('userName') || '');
            const [showNameModal, setShowNameModal] = useState(false);
            const [showGroupModal, setShowGroupModal] = useState(!localStorage.getItem('groupId'));
            const [groupId, setGroupId] = useState(localStorage.getItem('groupId') || '');
            const [groupName, setGroupName] = useState(localStorage.getItem('groupName') || '');
            const [groupMode, setGroupMode] = useState('enter'); // 'create' ou 'enter'
            const [formGroupName, setFormGroupName] = useState('');
            const [formGroupCode, setFormGroupCode] = useState('');
            const [showSuccess, setShowSuccess] = useState(false);
            const [showError, setShowError] = useState('');
            const [showGroupCode, setShowGroupCode] = useState(false);
            const [groupConfirmation, setGroupConfirmation] = useState(null); // { groupId, groupName, groupCode }
            const [copied, setCopied] = useState(false);
            const [formCollapsed, setFormCollapsed] = useState(false);
            const [mestreCollapsed, setMestreCollapsed] = useState(true);
            const [filterRecent, setFilterRecent] = useState(true);

            // Histórico de grupos do dispositivo
            const getSavedGroups = () => {
                try { return JSON.parse(localStorage.getItem('savedGroups') || '[]'); }
                catch { return []; }
            };
            const [savedGroups, setSavedGroups] = useState(getSavedGroups);
            // 'list' = lista de grupos salvos | 'form' = criar/entrar com código
            const [groupModalMode, setGroupModalMode] = useState(getSavedGroups().length > 0 ? 'list' : 'form');
            
            const [formData, setFormData] = useState({
                name: '',
                store: '',
                price: '',
                isPack: false,
                unitsPerPack: '12',
                numberOfPacks: '1',
                numberOfUnits: '1',
                mlPerUnit: '350',
                type: 'lata'
            });

            const mlOptions = {
                lata: [
                    { value: '269', label: '269ml' },
                    { value: '350', label: '350ml' },
                    { value: '473', label: '473ml' },
                    { value: '550', label: '550ml' }
                ],
                longneck: [
                    { value: '250', label: '250ml' },
                    { value: '300', label: '300ml' },
                    { value: '330', label: '330ml' },
                    { value: '355', label: '355ml' }
                ],
                garrafa: [
                    { value: '600', label: '600ml' },
                    { value: '1000', label: '1 litro' },
                    { value: '1500', label: '1,5 litros' }
                ]
            };

            const handleTypeChange = (newType) => {
                const firstMlOption = mlOptions[newType][0].value;
                setFormData({
                    ...formData,
                    type: newType,
                    mlPerUnit: firstMlOption
                });
            };

            const saveUserName = () => {
                if (userName.trim()) {
                    localStorage.setItem('userName', userName);
                    setShowNameModal(false);
                }
            };

            // Gerar código semi-legível: primeiras letras do nome + 4 chars aleatórios
            // Ex: "Viagem Praia 2026" → "VIA-7K3X"
            const generateGroupCode = (name) => {
                const prefix = name.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').substring(0, 3).padEnd(3, 'X');
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                const suffix = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
                return `${prefix}-${suffix}`;
            };

            const generateGroupId = () => {
                return Math.random().toString(36).substring(2, 10).toUpperCase();
            };

            // Criar novo grupo — só precisa do nome, código é gerado automaticamente
            const createGroup = async () => {
                if (!formGroupName.trim()) {
                    setShowError('Preencha o nome do grupo!');
                    return;
                }

                const newGroupId = generateGroupId();
                const newGroupCode = generateGroupCode(formGroupName);
                
                try {
                    const payload = {
                        action: 'create_group',
                        groupId: newGroupId,
                        groupName: formGroupName,
                        groupCode: newGroupCode
                    };

                    await fetch(CONFIG.appsScriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    localStorage.setItem('groupId', newGroupId);
                    localStorage.setItem('groupName', formGroupName);
                    localStorage.setItem('groupCode', newGroupCode);
                    saveGroupToHistory(newGroupId, formGroupName, newGroupCode);
                    
                    setGroupId(newGroupId);
                    setGroupName(formGroupName);
                    setShowGroupModal(false);
                    setShowSuccess(true);

                } catch (error) {
                    console.error('Erro ao criar grupo:', error);
                    setShowError('Erro ao criar grupo. Tente novamente.');
                }
            };

            // Buscar grupo pelo código e exibir confirmação
            const lookupGroup = async () => {
                if (!formGroupCode.trim()) {
                    setShowError('Digite o código do grupo!');
                    return;
                }

                try {
                    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values/${CONFIG.groupsRange}?key=${CONFIG.apiKey}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.values && data.values.length > 1) {
                        const group = data.values.slice(1).find(row =>
                            String(row[2]).trim().toUpperCase() === formGroupCode.trim().toUpperCase()
                        );

                        if (group) {
                            setGroupConfirmation({ groupId: group[0], groupName: group[1], groupCode: group[2] });
                            setShowError('');
                        } else {
                            setShowError('Código não encontrado! Verifique e tente novamente.');
                        }
                    } else {
                        setShowError('Nenhum grupo cadastrado ainda.');
                    }
                } catch (error) {
                    console.error('Erro ao buscar grupo:', error);
                    setShowError('Erro ao buscar grupo. Tente novamente.');
                }
            };

            // Confirmar entrada no grupo após visualizar o nome
            const confirmEnterGroup = () => {
                const { groupId: foundId, groupName: foundName, groupCode: foundCode } = groupConfirmation;
                localStorage.setItem('groupId', foundId);
                localStorage.setItem('groupName', foundName);
                localStorage.setItem('groupCode', foundCode);
                saveGroupToHistory(foundId, foundName, foundCode);
                setGroupId(foundId);
                setGroupName(foundName);
                setGroupConfirmation(null);
                setShowGroupModal(false);
                if (!localStorage.getItem('userName')) setShowNameModal(true);
                loadFromSheets();
            };

            // Salvar grupo no histórico do dispositivo
            const saveGroupToHistory = (id, name, code) => {
                const groups = getSavedGroups();
                const already = groups.find(g => g.groupId === id);
                if (!already) {
                    const updated = [...groups, { groupId: id, groupName: name, groupCode: code }];
                    localStorage.setItem('savedGroups', JSON.stringify(updated));
                    setSavedGroups(updated);
                }
            };

            // Remover grupo do histórico (não sai, só remove da lista)
            const removeGroupFromHistory = (id) => {
                const updated = getSavedGroups().filter(g => g.groupId !== id);
                localStorage.setItem('savedGroups', JSON.stringify(updated));
                setSavedGroups(updated);
            };

            // Entrar em um grupo da lista salva
            const enterSavedGroup = (group) => {
                localStorage.setItem('groupId', group.groupId);
                localStorage.setItem('groupName', group.groupName);
                localStorage.setItem('groupCode', group.groupCode);
                setGroupId(group.groupId);
                setGroupName(group.groupName);
                setShowGroupModal(false);
                if (!localStorage.getItem('userName')) setShowNameModal(true);
                loadFromSheets();
            };

            // Sair do grupo ativo (volta para a lista)
            const leaveGroup = () => {
                localStorage.removeItem('groupId');
                localStorage.removeItem('groupName');
                localStorage.removeItem('groupCode');
                setGroupId('');
                setGroupName('');
                setBeers([]);
                const groups = getSavedGroups();
                setGroupModalMode(groups.length > 0 ? 'list' : 'form');
                setShowGroupModal(true);
            };

            // Carregar dados do Google Sheets
            const loadFromSheets = async () => {
                if (!CONFIG.apiKey || CONFIG.apiKey === 'SUA_API_KEY_AQUI') {
                    console.log('⚠️ Configure a API Key primeiro!');
                    return;
                }

                if (!groupId) {
                    console.log('⚠️ Nenhum grupo selecionado');
                    return;
                }

                setLoading(true);
                try {
                    const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values/${CONFIG.beersRange}?key=${CONFIG.apiKey}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    
                    if (data.error) {
                        console.error('❌ Erro da API:', data.error);
                        setLoading(false);
                        return;
                    }
                    
                    if (data.values && data.values.length > 1) {
                        // Chave de deduplicação: Nome + Mercado + Tipo + ML + Grupo + Pack + Pack Info
                        // Pega só o registro mais recente de cada combinação (último na planilha = mais recente)
                        const deduped = new Map();
                        data.values.slice(1).forEach((row, index) => {
                            if (row[10] !== groupId) return;
                            const key = [
                                String(row[1] || '').trim().toLowerCase(),  // Nome
                                String(row[2] || '').trim().toLowerCase(),  // Mercado
                                String(row[6] || '').trim().toLowerCase(),  // Tipo
                                String(row[5] || '').trim(),                // ML
                                String(row[7] || '').trim(),                // Pack
                                String(row[8] || '').trim(),                // Pack Info
                                String(row[10] || '').trim()                // Grupo
                            ].join('|');
                            // Sobrescreve sempre — o último (mais recente) vence
                            deduped.set(key, { row, realRowIndex: index + 2 });
                        });

                        const loadedBeers = Array.from(deduped.values())
                            .filter(({ row }) => {
                                const deleted = String(row[11] ?? '').trim().toUpperCase();
                                return deleted !== 'TRUE' && deleted !== 'VERDADEIRO';
                            })
                            .map(({ row, realRowIndex }, index) => {
                                let priceValue = 0;
                                if (row[3]) {
                                    const priceStr = String(row[3]).replace(',', '.');
                                    priceValue = parseFloat(priceStr) || 0;
                                }
                                
                                const beer = {
                                    id: Date.now() + index,
                                    addedBy: row[0] || '',
                                    name: row[1] || '',
                                    store: row[2] || '',
                                    price: priceValue,
                                    quantity: parseInt(row[4]) || 0,
                                    mlPerUnit: parseInt(row[5]) || 0,
                                    type: row[6] || 'lata',
                                    isPack: row[7] === 'true' || row[7] === true,
                                    packInfo: row[8] || null,
                                    timestamp: row[9] || '',
                                    groupId: row[10] || '',
                                    deleted: row[11] === 'true' || row[11] === true,
                                    rowIndex: realRowIndex
                                };

                                beer.totalMl = beer.quantity * beer.mlPerUnit;
                                beer.totalLiters = beer.totalMl / 1000;
                                beer.pricePerLiter = beer.price / beer.totalLiters;
                                beer.pricePerUnit = beer.price / beer.quantity;

                                return beer;
                            });
                        
                        console.log('✅ Cervejas carregadas:', loadedBeers.length);
                        setBeers(prev => {
                            if (prev.length === 0 && loadedBeers.length > 0) {
                                setFormCollapsed(true);
                            }
                            return loadedBeers;
                        });
                    } else {
                        setBeers([]);
                    }
                } catch (error) {
                    console.error('❌ Erro ao carregar:', error);
                }
                setLoading(false);
            };

            // Salvar no Google Sheets
            const saveToSheets = async (beer) => {
                if (!CONFIG.appsScriptUrl || CONFIG.appsScriptUrl === 'SUA_URL_DO_APPS_SCRIPT_AQUI') {
                    console.log('⚠️ Apps Script URL não configurada.');
                    return;
                }

                try {
                    const payload = {
                        action: 'add_beer',
                        addedBy: beer.addedBy,
                        name: beer.name,
                        store: beer.store,
                        price: parseFloat(beer.price.toFixed(2)),
                        quantity: beer.quantity,
                        mlPerUnit: beer.mlPerUnit,
                        type: beer.type,
                        isPack: beer.isPack,
                        packInfo: beer.packInfo || '',
                        timestamp: beer.timestamp,
                        groupId: groupId,
                        deleted: false
                    };
                    
                    await fetch(CONFIG.appsScriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    await loadFromSheets();
                    
                } catch (error) {
                    console.error('❌ Erro ao salvar:', error);
                }
            };

            const addBeer = async () => {
                if (!formData.name || !formData.price) {
                    setShowError('Preencha pelo menos o nome e o preço!');
                    return;
                }

                if (!userName) {
                    setShowNameModal(true);
                    return;
                }

                let totalPrice;
                let totalQuantity;
                let packInfo = null;

                if (formData.isPack) {
                    totalQuantity = parseInt(formData.unitsPerPack) * parseInt(formData.numberOfPacks);
                    totalPrice = parseFloat(formData.price) * parseInt(formData.numberOfPacks);
                    packInfo = `${formData.numberOfPacks}x pack de ${formData.unitsPerPack}`;
                } else {
                    totalQuantity = parseInt(formData.numberOfUnits);
                    totalPrice = parseFloat(formData.price) * totalQuantity;
                }

                const now = new Date();
                const timestamp = now.toLocaleString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const newBeer = {
                    id: Date.now(),
                    addedBy: userName,
                    name: formData.name,
                    store: formData.store,
                    price: totalPrice,
                    quantity: totalQuantity,
                    mlPerUnit: parseInt(formData.mlPerUnit),
                    type: formData.type,
                    isPack: formData.isPack,
                    packInfo: packInfo,
                    timestamp: timestamp
                };

                newBeer.totalMl = newBeer.quantity * newBeer.mlPerUnit;
                newBeer.totalLiters = newBeer.totalMl / 1000;
                newBeer.pricePerLiter = newBeer.price / newBeer.totalLiters;
                newBeer.pricePerUnit = formData.isPack
                    ? newBeer.price / newBeer.quantity
                    : parseFloat(formData.price);

                setBeers([...beers, newBeer]);
                await saveToSheets(newBeer);

                setFormData({
                    name: '',
                    store: '',
                    price: '',
                    isPack: false,
                    unitsPerPack: '12',
                    numberOfPacks: '1',
                    numberOfUnits: '1',
                    mlPerUnit: mlOptions[formData.type][0].value,
                    type: formData.type
                });
            };

            const [showDeleteMessage, setShowDeleteMessage] = useState(false);
            const [beerToDelete, setBeerToDelete] = useState(null);

            // Soft delete: envia novo registro idêntico com Deletado=TRUE e timestamp atualizado
            const confirmDeleteBeer = async () => {
                const beer = beerToDelete;
                setShowDeleteMessage(false);
                setBeerToDelete(null);

                // Remove otimisticamente da UI
                setBeers(prev => prev.filter(b => b.id !== beer.id));

                try {
                    const now = new Date();
                    const timestamp = now.toLocaleString('pt-BR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const payload = {
                        action: 'add_beer',
                        addedBy: userName,   // quem deletou
                        name: beer.name,
                        store: beer.store,
                        price: parseFloat(beer.price.toFixed(2)),
                        quantity: beer.quantity,
                        mlPerUnit: beer.mlPerUnit,
                        type: beer.type,
                        isPack: beer.isPack,
                        packInfo: beer.packInfo || '',
                        timestamp: timestamp,
                        groupId: beer.groupId,
                        deleted: true
                    };

                    await fetch(CONFIG.appsScriptUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    await new Promise(resolve => setTimeout(resolve, 2000));
                    await loadFromSheets();
                } catch (error) {
                    console.error('❌ Erro ao deletar:', error);
                }
            };

            const deleteBeer = (beer) => {
                setBeerToDelete(beer);
                setShowDeleteMessage(true);
            };

            useEffect(() => {
                if (groupId) {
                    loadFromSheets();
                    const interval = setInterval(loadFromSheets, 30000);
                    return () => clearInterval(interval);
                }
            }, [groupId]);

            useEffect(() => {
                if (showError) {
                    const timer = setTimeout(() => setShowError(''), 5000);
                    return () => clearTimeout(timer);
                }
            }, [showError]);

            const parseDate = (timestampStr) => {
                if (!timestampStr) return new Date(0);
                try {
                    let datePart = timestampStr;
                    let timePart = "00:00:00";
                    if (timestampStr.includes(', ')) {
                        const parts = timestampStr.split(', ');
                        datePart = parts[0];
                        timePart = parts[1] || "00:00:00";
                    } else if (timestampStr.includes(' ')) {
                        const parts = timestampStr.split(' ');
                        datePart = parts[0];
                        timePart = parts[1] || "00:00:00";
                    }
                    
                    if (datePart.includes('/')) {
                        const [day, month, year] = datePart.split('/');
                        const [hour, minute, second] = timePart.split(':');
                        return new Date(year, month - 1, day, hour || 0, minute || 0, parseInt(second) || 0);
                    }
                    
                    const d = new Date(timestampStr);
                    if (isNaN(d.getTime())) return new Date(0);
                    return d;
                } catch {
                    return new Date(0);
                }
            };

            const getDaysAgo = (timestampStr) => {
                if (!timestampStr) return null;
                const d = parseDate(timestampStr);
                const diffTime = Math.abs(new Date() - d);
                return Math.floor(diffTime / (1000 * 60 * 60 * 24));
            };

            const getDaysColorClass = (days) => {
                if (days === null) return "text-gray-500 dark:text-gray-400";
                if (days <= 7) return "text-emerald-500 font-bold drop-shadow-sm";
                if (days <= 14) return "text-yellow-600 dark:text-yellow-500 font-semibold";
                if (days <= 25) return "text-orange-500 font-semibold";
                return "text-red-500 font-bold drop-shadow-sm";
            };

            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            const filteredBeers = filterRecent ? beers.filter(beer => parseDate(beer.timestamp) >= thirtyDaysAgo) : beers;
            const sortedBeers = [...filteredBeers].sort((a, b) => a.pricePerLiter - b.pricePerLiter);
            const bestDeal = sortedBeers[0];

            const isConfigured = CONFIG.apiKey !== 'SUA_API_KEY_AQUI' && 
                                CONFIG.spreadsheetId !== 'SEU_SPREADSHEET_ID_AQUI';

            return (
                <div className="min-h-screen bg-transparent p-4 md:p-8 transition-colors duration-200">
                    {/* Modal de Confirmar Remoção */}
                    {showDeleteMessage && beerToDelete && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 max-w-md w-full">
                                <div className="text-center">
                                    <div className="text-5xl mb-3">🗑️</div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-2">Remover entrada?</h3>
                                    <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4 text-left">
                                        <p className="font-semibold text-gray-800">{beerToDelete.name}</p>
                                        {beerToDelete.store && <p className="text-sm text-gray-600">📍 {beerToDelete.store}</p>}
                                        <p className="text-sm text-gray-500">Adicionado por: {beerToDelete.addedBy}</p>
                                    </div>
                                    <p className="text-gray-500 text-sm mb-5">
                                        Esta entrada será removida para todos no grupo.
                                    </p>
                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => { setShowDeleteMessage(false); setBeerToDelete(null); }}
                                            className="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-semibold hover:bg-gray-300"
                                        >
                                            Cancelar
                                        </button>
                                        <button
                                            onClick={confirmDeleteBeer}
                                            className="flex-1 bg-red-500 text-white py-2 rounded-lg font-semibold hover:bg-red-600"
                                        >
                                            Remover
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Modal de Sucesso */}
                    {showSuccess && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl p-6 max-w-md w-full">
                                <div className="text-center">
                                    <div className="text-6xl mb-4">🎉</div>
                                    <h3 className="text-2xl font-bold text-gray-800 mb-2">Grupo criado!</h3>
                                    <div className="bg-amber-50 border-2 border-amber-300 rounded-lg p-4 mb-4">
                                        <p className="text-sm text-gray-600 mb-2">Compartilhe este código com seus amigos:</p>
                                        <div className="flex items-center justify-center gap-2 my-2">
                                            <p className="text-3xl font-bold font-mono tracking-widest text-amber-700">{localStorage.getItem('groupCode')}</p>
                                            <button
                                                onClick={() => {
                                                    navigator.clipboard.writeText(localStorage.getItem('groupCode'));
                                                    setCopied(true);
                                                    setTimeout(() => setCopied(false), 2000);
                                                }}
                                                className="text-amber-600 hover:text-amber-800 hover:bg-amber-200 p-1.5 rounded-lg transition-colors"
                                                title="Copiar código"
                                            >
                                                {copied ? '✅' : '📋'}
                                            </button>
                                        </div>
                                        <p className="text-sm text-gray-500">{groupName}</p>
                                    </div>
                                    <p className="text-sm text-gray-600 mb-4">

                                {/* Mestre Cervejeiro */}
                                {filteredBeers.length > 0 && (() => {
                                    // Salvador da Pátria: quem cadastrou a melhor cerveja (topo do ranking)
                                    const salvador = sortedBeers[0]?.addedBy || null;

                                    // Agente de Campo: quem cadastrou mais cervejas
                                    const contagem = filteredBeers.reduce((acc, b) => {
                                        acc[b.addedBy] = (acc[b.addedBy] || 0) + 1;
                                        return acc;
                                    }, {});
                                    const agente = Object.entries(contagem).sort((a, b) => b[1] - a[1])[0]?.[0] || null;

                                    // Tá na Disney: pior média de custo-benefício, excluindo o Agente de Campo
                                    const medias = filteredBeers.reduce((acc, b) => {
                                        if (!acc[b.addedBy]) acc[b.addedBy] = { total: 0, count: 0 };
                                        acc[b.addedBy].total += b.pricePerLiter;
                                        acc[b.addedBy].count += 1;
                                        return acc;
                                    }, {});
                                    const disney = Object.entries(medias)
                                        .filter(([name]) => name !== agente)
                                        .map(([name, v]) => ({ name, avg: v.total / v.count }))
                                        .sort((a, b) => b.avg - a.avg)[0]?.name || null;

                                    return (
                                        <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 mb-6 overflow-hidden transition-all duration-300">
                                            <button
                                                onClick={() => setMestreCollapsed(!mestreCollapsed)}
                                                className="w-full flex items-center justify-between p-5 md:p-6 text-left hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors group"
                                            >
                                                <div className="flex items-center gap-3">
                                                    <div className="bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-sm group-hover:scale-105 transition-transform">🏅</div>
                                                    <h2 className="text-xl font-bold text-gray-800 dark:text-white">Mestre Cervejeiro</h2>
                                                </div>
                                                <span className={`text-gray-400 dark:text-gray-500 text-lg transition-transform duration-300 transform ${mestreCollapsed ? 'rotate-180' : 'rotate-0'}`}>▲</span>
                                            </button>
                                            {!mestreCollapsed && (
                                                <div className="px-5 pb-5 md:px-6 md:pb-6 grid grid-cols-1 md:grid-cols-3 gap-4 animate-slide-in">
                                                    <div className="relative overflow-hidden bg-gradient-to-br from-green-50 to-emerald-100 dark:from-green-900/20 dark:to-emerald-900/20 border border-green-200 dark:border-green-800/50 rounded-2xl p-5 text-center shadow-sm hover:shadow-md transition-shadow">
                                                        <div className="text-4xl mb-2 drop-shadow-sm transform hover:scale-110 transition-transform">🦸</div>
                                                        <p className="font-extrabold text-green-800 dark:text-green-400 text-sm tracking-wide uppercase">Salvador da Pátria</p>
                                                        <p className="text-green-700 dark:text-green-300 font-bold text-lg mt-1">{salvador || '—'}</p>
                                                        <p className="text-xs text-green-600 dark:text-green-500/80 mt-1 font-medium">Melhor Custo Benefício</p>
                                                    </div>
                                                    <div className="relative overflow-hidden bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-blue-900/20 dark:to-indigo-900/20 border border-blue-200 dark:border-blue-800/50 rounded-2xl p-5 text-center shadow-sm hover:shadow-md transition-shadow">
                                                        <div className="text-4xl mb-2 drop-shadow-sm transform hover:scale-110 transition-transform">🕵️</div>
                                                        <p className="font-extrabold text-blue-800 dark:text-blue-400 text-sm tracking-wide uppercase">Agente de Campo</p>
                                                        <p className="text-blue-700 dark:text-blue-300 font-bold text-lg mt-1">{agente || '—'}</p>
                                                        <p className="text-xs text-blue-600 dark:text-blue-500/80 mt-1 font-medium">Mais contribuições</p>
                                                    </div>
                                                    <div className="relative overflow-hidden bg-gradient-to-br from-amber-50 to-orange-100 dark:from-amber-900/20 dark:to-orange-900/20 border border-amber-200 dark:border-amber-800/50 rounded-2xl p-5 text-center shadow-sm hover:shadow-md transition-shadow">
                                                        <div className="text-4xl mb-2 drop-shadow-sm transform hover:scale-110 transition-transform">🎢</div>
                                                        <p className="font-extrabold text-amber-800 dark:text-amber-400 text-sm tracking-wide uppercase">Tá na Disney</p>
                                                        <p className="text-amber-700 dark:text-amber-300 font-bold text-lg mt-1">{disney || (agente ? '—' : '—')}</p>
                                                        <p className="text-xs text-amber-600 dark:text-amber-500/80 mt-1 font-medium">Pior Custo Benefício</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}

                                {/* Ranking */}
                                {filteredBeers.length > 0 && (
                                    <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-5 md:p-6 mb-6">
                                        <div className="flex items-center gap-3 mb-6">
                                            <div className="bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 w-10 h-10 rounded-xl flex items-center justify-center text-xl shadow-sm">📊</div>
                                            <h2 className="text-xl font-bold text-gray-800 dark:text-white">Ranking</h2>
                                        </div>
                                        
                                        {bestDeal && (
                                            <div className="bg-gradient-to-r from-green-50 to-emerald-50 dark:from-green-900/20 dark:to-emerald-900/20 border border-green-300 dark:border-green-600/50 rounded-2xl p-5 mb-6 shadow-sm relative overflow-hidden">
                                                <div className="absolute -right-4 -top-4 text-7xl opacity-10 transform rotate-12">🏆</div>
                                                <h3 className="font-extrabold text-green-800 dark:text-green-400 mb-2 flex items-center gap-2 drop-shadow-sm">🏆 <span className="uppercase tracking-wide text-sm">Melhor Custo-Benefício!</span></h3>
                                                <p className="text-green-900 dark:text-green-300 text-lg">
                                                    <strong>{bestDeal.name}</strong> • <span className="font-mono bg-green-200/50 dark:bg-green-800/50 px-2 py-0.5 rounded">R$ {bestDeal.pricePerLiter.toFixed(2)}/L</span>
                                                </p>
                                                <div className="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4 mt-3 text-sm text-green-700 dark:text-green-500/90 font-medium">
                                                    {bestDeal.store && <p>📍 {bestDeal.store}</p>}
                                                    <p>👤 {bestDeal.addedBy}</p>
                                                </div>
                                            </div>
                                        )}

                                        <div className="space-y-4">
                                            {sortedBeers.map((beer, index) => (
                                                <div key={beer.id} className={`border rounded-2xl p-5 hover:shadow-md transition-all duration-300 ${beer.id === bestDeal?.id ? 'border-green-400 dark:border-green-500/50 bg-green-50/50 dark:bg-green-900/10' : 'border-gray-200 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50'}`}>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="flex-1">
                                                            <h3 className={`font-bold text-lg mb-1 flex items-center gap-2 ${beer.id === bestDeal?.id ? 'text-green-800 dark:text-green-400' : 'text-gray-900 dark:text-white'}`}>
                                                                {index === 0 && <span className="text-2xl drop-shadow-sm">🏆</span>}
                                                                {beer.name}
                                                            </h3>
                                                            {beer.store && <p className="text-sm text-indigo-600 dark:text-indigo-400 font-semibold mb-1">📍 {beer.store}</p>}
                                                            <div className="flex flex-wrap items-center gap-2 text-sm text-gray-600 dark:text-gray-400 mb-2">
                                                                {beer.packInfo && <span className="bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 px-2 py-0.5 rounded-md font-medium text-xs">{beer.packInfo}</span>}
                                                                <span>{beer.quantity}x {beer.mlPerUnit}ml ({beer.type})</span>
                                                            </div>
                                                            <p className="text-xs text-gray-500 dark:text-gray-500 font-medium">
                                                                👤 {beer.addedBy}
                                                                {beer.timestamp && (() => {
                                                                    const days = getDaysAgo(beer.timestamp);
                                                                    const colorClass = getDaysColorClass(days);
                                                                    return (
                                                                        <span className="opacity-90 ml-1.5 inline-block">
                                                                            • 🕒 {beer.timestamp.split(',')[0]} <span className={`ml-1 ${colorClass}`}>({days === 0 ? 'Hoje' : days === 1 ? 'Ontem' : `${days} dias atrás`})</span>
                                                                        </span>
                                                                    );
                                                                })()}
                                                            </p>
                                                        </div>
                                                        <button onClick={() => deleteBeer(beer)} className="text-red-400 dark:text-red-500 hover:text-red-600 dark:hover:text-red-400 p-2.5 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-colors" title="Remover cerveja">🗑️</button>
                                                    </div>
                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                                                        {[
                                                            { label: 'Total', val: `R$ ${beer.price.toFixed(2)}` },
                                                            { label: 'Por Litro', val: `R$ ${beer.pricePerLiter.toFixed(2)}` },
                                                            { label: 'Por Unidade', val: `R$ ${beer.pricePerUnit.toFixed(2)}` },
                                                            { label: 'Volume', val: `${beer.totalLiters.toFixed(2)}L` }
                                                        ].map((stat, i) => (
                                                            <div key={i} className={`bg-white dark:bg-gray-900 rounded-xl p-3 border ${beer.id === bestDeal?.id ? 'border-green-200 dark:border-green-800/50' : 'border-gray-200 dark:border-gray-700'}`}>
                                                                <p className="text-gray-500 dark:text-gray-400 text-xs font-medium tracking-wide uppercase mb-1">{stat.label}</p>
                                                                <p className={`font-bold font-mono ${beer.id === bestDeal?.id ? 'text-green-700 dark:text-green-400' : 'text-gray-900 dark:text-gray-100'}`}>{stat.val}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {filteredBeers.length === 0 && (
                                    <div className="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-700 p-12 text-center">
                                        <div className="text-7xl mb-6 animate-pulse drop-shadow-md">🍺</div>
                                        <h3 className="text-xl font-bold text-gray-800 dark:text-white mb-2">A lista está vazia!</h3>
                                        <p className="text-gray-500 dark:text-gray-400 mb-4">Adicione a primeira cerveja para começar o ranking do grupo.</p>
                                    </div>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<BeerCalculator />, document.getElementById('root'));
    </script>
</body>
</html>
